<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:disabled {
            background-color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            border: 4px solid #fff;
            outline: 1px solid #e2e8f0;
            position: relative;
        }

        #myCanvas {
            display: block;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* สลับซ้ายขวาให้เหมือนกระจกเงา */
        }

        #label-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .prediction-item {
            background-color: #f1f5f9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>
    
    <!-- ซ่อน element video ดั้งเดิมไว้เบื้องหลัง ไม่ให้แสดงผลสด -->
    <video id="myVideo" autoplay playsinline style="display:none;"></video>
    
    <div id="webcam-container">
        <!-- ใช้ Canvas แสดงภาพนิ่งที่จะอัปเดตเฉพาะทุกๆ 3 วินาที -->
        <canvas id="myCanvas" width="200" height="200"></canvas>
    </div>
    
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/vNuveE7hV/";

    let model, labelContainer, maxPredictions;
    let videoElement, canvasElement, canvasCtx;
    let predictInterval;

    async function init() {
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Loading...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // 1. โหลดโมเดล Teachable Machine
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // 2. เรียกเปิดกล้องผ่านเบราว์เซอร์และผูกเข้ากับ HTML5 Video
        videoElement = document.getElementById("myVideo");
        canvasElement = document.getElementById("myCanvas");
        canvasCtx = canvasElement.getContext("2d");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 200, height: 200 } 
            });
            videoElement.srcObject = stream;
        } catch (err) {
            alert("ไม่สามารถเข้าถึงกล้องได้: " + err);
            document.getElementById("start-btn").disabled = false;
            document.getElementById("start-btn").innerText = "Start Camera";
            return;
        }

        // 3. เตรียม UI สำหรับแสดงข้อมูลทำนาย
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");
            div.className = "prediction-item";
            labelContainer.appendChild(div);
        }

        document.getElementById("start-btn").innerText = "Snap & Predict (Every 3s)";

        // รอให้สัญญาณวิดีโอพร้อมสักครู่ แล้วเริ่มทำงานทันทีในครั้งแรก
        setTimeout(async () => {
            await captureAndPredict();
            // ตั้งเวลาให้ทำการจับภาพและทำนายผล "ทุกๆ 3 วินาที" เท่านั้น
            predictInterval = setInterval(captureAndPredict, 3000);
        }, 1000);
    }

    // ฟังก์ชันที่จะทำงานทุกๆ 3 วินาที
    async function captureAndPredict() {
        if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            // ดึงภาพจากวิดีโอสด ณ วินาทีนั้น มาวาดลงบน Canvas (ภาพบนจอจะอัปเดตเป็นภาพนิ่งใหม่)
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            
            // ส่ง Canvas ภาพนิ่งนี้ไปให้โมเดลประมวลผลทำนาย
            await predict();
        }
    }

    // ฟังก์ชันคำนวณและแสดงผลเปอร์เซ็นต์
    async function predict() {
        // ประมวลผลโดยใช้ canvas ล่าสุดที่เพิ่งวาดเสร็จ
        const prediction = await model.predict(canvasElement);
        for (let i = 0; i < maxPredictions; i++) {
            const probabilityPercent = (prediction[i].probability * 100).toFixed(0);
            
            labelContainer.childNodes[i].innerHTML = `
                <span>${prediction[i].className}</span>
                <strong>${probabilityPercent}%</strong>
            `;
        }
    }
</script>

</body>
</html>
