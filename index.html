<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:disabled {
            background-color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            border: 4px solid #fff;
            outline: 1px solid #e2e8f0;
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .prediction-item {
            background-color: #f1f5f9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine[cite: 1]
    const URL = "https://teachablemachine.withgoogle.com/models/vNuveE7hV/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        // ล็อคปุ่มไม่ให้กดซ้ำ
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Loading...";

        const modelURL = URL + "model.json";[cite: 1]
        const metadataURL = URL + "metadata.json";[cite: 1]

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // ตั้งค่ากล้อง Webcam
        const flip = true;[cite: 1]
        webcam = new tmImage.Webcam(200, 200, flip);[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]

        // นำแคนวาสของกล้องไปแปะบนหน้าเว็บ
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
        
        // สร้างป้ายแสดงผลลัพธ์
        labelContainer = document.getElementById("label-container");[cite: 1]
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const div = document.createElement("div");
            div.className = "prediction-item";
            labelContainer.appendChild(div);[cite: 1]
        }

        document.getElementById("start-btn").innerText = "Watching (Every 3s)";

        // ลบ window.requestAnimationFrame(loop) ออกทั้งหมด เพื่อไม่ให้ทำนายผลแบบ Real-time
        
        // สั่งให้กล้องอัปเดตภาพและทำนายผลทันทีกรณีเริ่มงานครั้งแรก
        await processEveryThreeSeconds();

        // ตั้งเวลาให้ฟังก์ชันทำงาน "เฉพาะ" ทุก ๆ 3 วินาทีเท่านั้น
        predictInterval = setInterval(processEveryThreeSeconds, 3000);
    }

    // ฟังก์ชันรวบยอด: อัปเดตเฟรมภาพกล้องใหม่ล่าสุด ณ วินาทีนั้น + สั่งทำนายผลทันที
    async function processEveryThreeSeconds() {
        if (webcam) {
            webcam.update(); // ดึงภาพเฟรมปัจจุบันจากกล้อง ณ วินาทีที่ครบกำหนด[cite: 1]
            await predict(); // สั่งทำนายผลภาพนั้น[cite: 1]
        }
    }

    // ฟังก์ชันทำนายผลและแปลงค่าเป็นเปอร์เซ็นต์
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const probabilityPercent = (prediction[i].probability * 100).toFixed(0);
            
            labelContainer.childNodes[i].innerHTML = `
                <span>${prediction[i].className}</span>
                <strong>${probabilityPercent}%</strong>
            `;
        }
    }
</script>

</body>
</html>
