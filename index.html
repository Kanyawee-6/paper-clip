<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier (Every 3s)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #111827;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        #webcam-container {
            width: 240px;
            height: 240px;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            overflow: hidden;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .result-item {
            margin-bottom: 12px;
            text-align: left;
        }

        .result-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .progress-bar-bg {
            background: #e5e7eb;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #2563eb;
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Image Classification</h2>[cite: 1]
    <button class="btn-primary" id="start-btn" onclick="init()">เปิดใช้งานกล้อง</button>[cite: 1]
    
    <div id="webcam-container"></div>[cite: 1]
    <div id="label-container"></div>[cite: 1]
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>[cite: 1]
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>[cite: 1]
<script>
    const URL = "https://teachablemachine.withgoogle.com/models/vNuveE7hV/";[cite: 1]
    let model, webcam, labelContainer, maxPredictions;
    let timer;

    async function init() {
        // ซ่อนปุ่มเมื่อเริ่มทำงาน
        document.getElementById("start-btn").style.display = "none";

        // โหลดโมเดล AI
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // ตั้งค่ากล้อง
        webcam = new tmImage.Webcam(240, 240, true);[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]
        
        window.requestAnimationFrame(loop);

        // แสดงผลกล้องบนหน้าเว็บ
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
        labelContainer = document.getElementById("label-container");[cite: 1]
        
        // สร้างแถบผลลัพธ์ (Progress Bar) รอไว้
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const item = document.createElement("div");
            item.className = "result-item";
            item.innerHTML = `
                <div class="result-info">
                    <span class="label-name">กำลังโหลด...</span>
                    <span class="label-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill"></div>
                </div>
            `;
            labelContainer.appendChild(item);
        }

        // เริ่มทำการทายผลทุกๆ 3 วินาที (3000 มิลลิวินาที)
        timer = setInterval(predict, 3000);
    }

    async function loop() {
        webcam.update(); // อัปเดตเฟรมภาพให้เคลื่อนไหวลื่นไหลตลอดเวลา[cite: 1]
        window.requestAnimationFrame(loop);[cite: 1]
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const item = labelContainer.childNodes[i];
            const nameSpan = item.querySelector(".label-name");
            const percentSpan = item.querySelector(".label-percent");
            const barFill = item.querySelector(".progress-bar-fill");

            const percentValue = Math.round(prediction[i].probability * 100);
            
            nameSpan.innerText = prediction[i].className;
            percentSpan.innerText = percentValue + "%";
            barFill.style.width = percentValue + "%";
        }
    }
</script>

</body>
</html>
