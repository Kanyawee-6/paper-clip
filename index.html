<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:disabled {
            background-color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            border: 4px solid #fff;
            outline: 1px solid #e2e8f0;
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .prediction-item {
            background-color: #f1f5f9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/vNuveE7hV/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        // ปิดปุ่ม Start เพื่อไม่ให้กดซ้ำตอนกำลังโหลด
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Loading...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดลและ Metadata
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้อง Webcam
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();

        // นำภาพจากกล้องใส่ลงในหน้าเว็บ
        document.getElementById("webcam-container").innerHTML = ""; // เคลียร์พื้นหลังเดิม
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        // เตรียมพื้นที่สำหรับแสดงผลลัพธ์
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // เคลียร์ค่าเก่าหากมี
        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");
            div.className = "prediction-item";
            labelContainer.appendChild(div);
        }

        document.getElementById("start-btn").innerText = "Running...";

        // อัปเดตเฟรมภาพเคลื่อนไหวของกล้องตลอดเวลาเพื่อให้ภาพลื่นไหล (แต่ยังไม่ทำนายผล)
        window.requestAnimationFrame(updateWebcamFrame);

        // ทำนายผลครั้งแรกทันที
        await loop();

        // ตั้งเวลาให้ทำการดึงภาพมาทำนายผล (Predict) ทุก ๆ 3 วินาที (3000 มิลลิวินาที)
        predictInterval = setInterval(loop, 3000);
    }

    // ฟังก์ชันสำหรับอัปเดตภาพของกล้องให้เคลื่อนไหวเป็นปกติ
    function updateWebcamFrame() {
        webcam.update();
        window.requestAnimationFrame(updateWebcamFrame);
    }

    async function loop() {
        // ดึงภาพปัจจุบันจากกล้องไปทำนายผล
        await predict();
    }

    // ฟังก์ชันทำนายผล
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            // คำนวณเปอร์เซ็นต์ความน่าจะเป็น
            const probabilityPercent = (prediction[i].probability * 100).toFixed(0);
            
            // แสดงผลชื่อคลาสและเปอร์เซ็นต์ในรูปแบบที่สวยงาม
            labelContainer.childNodes[i].innerHTML = `
                <span>${prediction[i].className}</span>
                <strong>${probabilityPercent}%</strong>
            `;
        }
    }
</script>

</body>
</html>
