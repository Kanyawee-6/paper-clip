<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- นำเข้าฟอนต์ Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .btn-start {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2);
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background-color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #fff;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-row {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #4CAF50;
            font-size: 15px;
            color: #444;
        }

        .prediction-bar-bg {
            background: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            width: 100%;
            margin-top: 5px;
            overflow: hidden;
        }

        .prediction-bar-fill {
            background: #4CAF50;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button class="btn-start" type="button" onclick="init()">เปิดกล้องเริ่มต้นทำงาน</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงที่นี่ -->
    </div>
    
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงที่นี่ -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>[cite: 1]
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/vNuveE7hV/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let updateInterval;

    async function init() {
        // ซ่อนปุ่มเปิดกล้องหลังจากกด เพื่อป้องกันการกดซ้ำ
        document.querySelector('.btn-start').style.display = 'none';
        
        const modelURL = URL + "model.json";[cite: 1]
        const metadataURL = URL + "metadata.json";[cite: 1]

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // ตั้งค่ากล้อง (ปรับขนาดให้ใหญ่ขึ้นเล็กน้อยเป็น 250x250 ให้เข้ากับดีไซน์)
        const flip = true;[cite: 1]
        webcam = new tmImage.Webcam(250, 250, flip);[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]
        
        // แสดงวิดีโอบนหน้าจอ
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
        labelContainer = document.getElementById("label-container");[cite: 1]
        
        // สร้างโครงสร้างสำหรับการแสดงผลลัพธ์ที่สวยงาม
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            let row = document.createElement("div");
            row.className = "prediction-row";
            
            let textSpan = document.createElement("span");
            textSpan.id = `label-text-${i}`;
            
            let barBg = document.createElement("div");
            barBg.className = "prediction-bar-bg";
            
            let barFill = document.createElement("div");
            barFill.className = "prediction-bar-fill";
            barFill.id = `label-bar-${i}`;
            
            barBg.appendChild(barFill);
            row.appendChild(textSpan);
            
            let wrapper = document.createElement("div");
            wrapper.style.width = "100%";
            wrapper.appendChild(row);
            wrapper.appendChild(barBg);
            wrapper.style.marginBottom = "12px";
            
            labelContainer.appendChild(wrapper);
        }

        // เรียกฟังก์ชันครั้งแรกทันที
        updateWebcamAndPredict();

        // ตั้งเวลาให้ดึงภาพจากกล้องและทำนายผลทุกๆ 3 วินาที (3000 มิลลิวินาที)
        updateInterval = setInterval(updateWebcamAndPredict, 3000);
    }

    // ฟังก์ชันหลักที่จะทำงานทุกๆ 3 วินาที
    async function updateWebcamAndPredict() {
        if (webcam) {
            webcam.update(); // อัปเดตเฟรมภาพจากกล้อง[cite: 1]
            await predict(); // ทำนายผล[cite: 1]
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentage = (probability * 100).toFixed(0);
            
            // แสดงข้อความชื่อคลาสและความน่าจะเป็น
            const textElement = document.getElementById(`label-text-${i}`);
            if(textElement) {
                textElement.innerHTML = `<strong>${className}</strong> <span>${percentage}%</span>`;
            }
            
            // ปรับความยาวของ Progress Bar ตามค่าความน่าจะเป็น
            const barElement = document.getElementById(`label-bar-${i}`);
            if(barElement) {
                barElement.style.width = `${percentage}%`;
                
                // เปลี่ยนสีแถบตามความมั่นใจ (มั่นใจมากสีเขียว มั่นใจน้อยสีส้ม/แดง)
                if (probability > 0.7) {
                    barElement.style.backgroundColor = '#4CAF50';
                } else if (probability > 0.4) {
                    barElement.style.backgroundColor = '#FF9800';
                } else {
                    barElement.style.backgroundColor = '#F44336';
                }
            }
        }
    }
</script>

</body>
</html>
